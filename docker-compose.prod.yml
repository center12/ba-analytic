version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ba_analytic_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ba_analytic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ba_analytic_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ba_analytic_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'

volumes:
  postgres_data:
  uploads_data:
